<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1c1917"/>

  <!-- Amber accent ring (subtle) -->
  <circle cx="32" cy="32" r="30" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>

  <!-- Mountain peaks (Himalayas) -->
  <polygon points="14,44 26,20 32,30 38,18 50,44" fill="#44403c"/>
  <polygon points="26,20 32,30 38,18 50,44 32,44" fill="#57534e"/>

  <!-- Snow cap left peak -->
  <polygon points="26,20 29.5,27 22.5,27" fill="#fef3c7"/>

  <!-- Snow cap right peak (main) -->
  <polygon points="38,18 42,27 34,27" fill="#fffbeb"/>

  <!-- Sun / golden sunrise above peaks -->
  <circle cx="32" cy="17" r="6" fill="#f59e0b"/>

  <!-- Sun rays -->
  <line x1="32" y1="8"  x2="32" y2="5"  stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="10" x2="42" y2="8"  stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="17" x2="47" y2="17" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="10" x2="22" y2="8"  stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="17" x2="17" y2="17" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- River/water at base -->
  <path d="M10 46 Q20 43 32 46 Q44 49 54 46 L54 50 Q44 53 32 50 Q20 47 10 50 Z" fill="#1d4ed8" opacity="0.5"/>
  <path d="M10 48 Q20 45 32 48 Q44 51 54 48" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.6" fill="none"/>

  <!-- Ground -->
  <rect x="10" y="44" width="44" height="4" rx="1" fill="#292524"/>
</svg>
